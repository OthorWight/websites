<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Vision Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        .highlight-attacked { box-shadow: inset 0 0 0 4px rgba(239, 68, 68, 0.9) !important; } 
        .highlight-protected { box-shadow: inset 0 0 0 4px rgba(34, 197, 94, 0.9) !important; } 
        .highlight-both { box-shadow: inset 0 0 0 4px rgba(249, 115, 22, 0.9) !important; } 

        .highlight-last-move { box-shadow: inset 0 0 0 100px rgba(234, 179, 8, 0.4) !important; }
        .highlight-last-move.highlight-attacked { box-shadow: inset 0 0 0 100px rgba(234, 179, 8, 0.4), inset 0 0 0 4px rgba(239, 68, 68, 0.9) !important; }
        .highlight-last-move.highlight-protected { box-shadow: inset 0 0 0 100px rgba(234, 179, 8, 0.4), inset 0 0 0 4px rgba(34, 197, 94, 0.9) !important; }
        .highlight-last-move.highlight-both { box-shadow: inset 0 0 0 100px rgba(234, 179, 8, 0.4), inset 0 0 0 4px rgba(249, 115, 22, 0.9) !important; }
        
        .highlight-empty-attacked::after {
            content: '';
            display: block;
            width: 30%;
            height: 30%;
            background-color: rgba(239, 68, 68, 0.6);
            border-radius: 50%;
            margin: 35%;
            pointer-events: none;
        }
        
        #board-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #board { 
            width: 100%; 
            max-width: min(100%, 75vh); 
            position: relative;
        }

        [class^="chessboard-"] { position: relative !important; }

        [class^="spare-pieces-"] {
            position: absolute !important;
            top: 50% !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 1vh !important;
            background-color: #374151 !important; 
            padding: 8px !important;
            border-radius: 8px !important;
            border: 1px solid #4B5563 !important; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3) !important;
            height: max-content !important;
            z-index: 20;
        }

        [class^="chessboard-"] > [class^="spare-pieces-"]:first-child {
            left: 0 !important;
            transform: translate(-130%, -50%) !important;
        }

        [class^="chessboard-"] > [class^="spare-pieces-"]:last-child {
            right: 0 !important;
            transform: translate(130%, -50%) !important;
        }

        [class^="spare-pieces-"] img {
            width: clamp(32px, 4vw, 60px) !important;
            height: clamp(32px, 4vw, 60px) !important;
            margin: 0 !important;
            display: block !important;
            cursor: grab !important;
        }
        
        [class^="spare-pieces-"] img:active { cursor: grabbing !important; }

        /* Promotion Highlights */
        #board.promotion-pending[data-promotion-color="w"] [class^="chessboard-"] > [class^="spare-pieces-"] img[data-piece="wQ"],
        #board.promotion-pending[data-promotion-color="w"] [class^="chessboard-"] > [class^="spare-pieces-"] img[data-piece="wR"],
        #board.promotion-pending[data-promotion-color="w"] [class^="chessboard-"] > [class^="spare-pieces-"] img[data-piece="wB"],
        #board.promotion-pending[data-promotion-color="w"] [class^="chessboard-"] > [class^="spare-pieces-"] img[data-piece="wN"],
        #board.promotion-pending[data-promotion-color="b"] [class^="chessboard-"] > [class^="spare-pieces-"] img[data-piece="bQ"],
        #board.promotion-pending[data-promotion-color="b"] [class^="chessboard-"] > [class^="spare-pieces-"] img[data-piece="bR"],
        #board.promotion-pending[data-promotion-color="b"] [class^="chessboard-"] > [class^="spare-pieces-"] img[data-piece="bB"],
        #board.promotion-pending[data-promotion-color="b"] [class^="chessboard-"] > [class^="spare-pieces-"] img[data-piece="bN"] {
            background-color: rgba(168, 85, 247, 0.4) !important;
            box-shadow: 0 0 10px 4px rgba(168, 85, 247, 0.8) !important;
            border-radius: 50%;
            cursor: pointer !important;
        }

        /* Custom scrollbar for notation */
        #moveHistory::-webkit-scrollbar { width: 6px; }
        #moveHistory::-webkit-scrollbar-track { background: #374151; border-radius: 4px; }
        #moveHistory::-webkit-scrollbar-thumb { background: #6B7280; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 font-sans p-2 sm:p-6 min-h-screen flex items-center justify-center overflow-hidden">

    <div class="w-full max-w-[1800px] h-[85vh] bg-gray-800 rounded-lg shadow-2xl flex flex-col lg:flex-row border border-gray-700">
        
        <div class="p-6 lg:p-8 lg:w-3/12 flex flex-col border-b lg:border-b-0 lg:border-r border-gray-700 bg-gray-800 h-64 lg:h-full">
            <div class="flex justify-between items-center mb-4 border-b border-gray-600 pb-2 shrink-0">
                <h3 class="text-xl font-semibold text-white">Match History</h3>
                <div class="flex items-center gap-2">
                    <select id="timelineSelect" class="hidden bg-gray-700 text-white py-1 px-2 rounded border border-gray-600 text-xs focus:outline-none focus:border-purple-500"></select>
                    <button id="exportPgnBtn" class="bg-gray-700 hover:bg-gray-600 text-white py-1 px-2 rounded border border-gray-600 text-xs focus:outline-none focus:border-purple-500 transition">Export PGN</button>
                </div>
            </div>
            <div class="flex flex-row flex-1 gap-4 overflow-hidden min-h-0">
                <div class="w-6 bg-gray-700 rounded-full overflow-hidden flex flex-col border border-gray-600 relative shrink-0 shadow-inner">
                    <div id="evalBarBlack" class="w-full bg-gray-900 transition-all duration-300 absolute" style="height: 50%; top: 0;"></div>
                    <div id="evalBarWhite" class="w-full bg-gray-200 transition-all duration-300 absolute" style="height: 50%; bottom: 0;"></div>
                </div>
                <div id="moveHistory" class="flex-grow bg-gray-700 rounded-lg p-3 overflow-y-auto text-sm shadow-inner border border-gray-600 content-start">
                    </div>
            </div>
        </div>

        <div class="py-10 px-12 sm:px-24 lg:px-20 lg:w-6/12 flex flex-col items-center justify-center border-b lg:border-b-0 lg:border-r border-gray-700 relative bg-gray-800">
            <div class="w-full flex justify-between items-center mb-6 max-w-[75vh]">
                <h2 class="text-3xl font-bold text-white tracking-wide">Chess Vision Practice</h2>
                <div id="engineStatus" class="text-sm px-3 py-1 rounded bg-yellow-600 text-white font-medium shadow-md">Loading Engine...</div>
            </div>
            <div id="board-wrapper">
                <div id="board"></div>
            </div>
        </div>

        <div class="p-6 lg:p-8 lg:w-3/12 flex flex-col bg-gray-800 overflow-y-auto h-full">
            
            <h3 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2 text-white shrink-0">Play vs Bot</h3>
            <div class="grid grid-cols-1 gap-3 mb-6 text-sm shrink-0">
                <select id="botElo" class="bg-gray-700 text-white py-3 px-4 rounded border border-gray-600 focus:outline-none focus:border-purple-500 transition">
                    <option value="800">Bot Elo: 800 (Beginner)</option>
                    <option value="1200">Bot Elo: 1200 (Intermediate)</option>
                    <option value="1500" selected>Bot Elo: 1500 (Club Player)</option>
                    <option value="2000">Bot Elo: 2000 (Expert)</option>
                    <option value="2500">Bot Elo: 2500 (Grandmaster)</option>
                </select>
                <button id="startBotBtn" class="bg-green-600 hover:bg-green-700 text-white py-3 px-4 rounded font-bold transition shadow tracking-wide">Start Bot (Takes Top Color)</button>
            </div>

            <h3 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2 text-white mt-2 shrink-0">Board Controls</h3>
            <div class="grid grid-cols-2 gap-3 mb-6 text-sm shrink-0">
                <div class="flex items-center justify-center bg-gray-700 rounded p-2 border border-gray-600 col-span-2 shadow-inner">
                    <label class="font-medium cursor-pointer flex items-center gap-2 text-white tracking-wide">
                        <input type="checkbox" id="autoHintToggle" class="w-5 h-5 rounded focus:ring-purple-500 bg-gray-600 border-gray-500 text-purple-600" checked>
                        Auto-Show Top 5 Moves
                    </label>
                </div>
                
                <div class="flex items-center justify-between bg-gray-700 rounded p-2 border border-gray-600 col-span-2 shadow-inner">
                    <label class="font-medium cursor-pointer flex items-center gap-2 text-gray-200">
                        <input type="checkbox" id="editModeToggle" class="w-5 h-5 rounded focus:ring-blue-500 bg-gray-600 border-gray-500">
                        Edit Mode
                    </label>
                    <select id="turnSelect" disabled class="bg-gray-800 text-white py-1 px-2 rounded border border-gray-600 focus:outline-none focus:border-blue-500 text-sm font-semibold disabled:opacity-50 disabled:cursor-not-allowed">
                        <option value="w">White to Move</option>
                        <option value="b">Black to Move</option>
                    </select>
                </div>

                <button id="flipBtn" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded transition shadow col-span-2">Flip Board</button>
                <button id="resetBtn" class="bg-gray-600 hover:bg-gray-500 text-white py-2 px-4 rounded transition shadow">Reset to Start</button>
                <button id="clearBtn" class="bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded transition shadow">Clear Board</button>
                
                <div class="col-span-2 text-center text-xs text-gray-400 mt-1 italic">
                    Tip: When a pawn reaches the end, click a highlighted spare piece to promote.
                </div>
            </div>

            <h3 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2 text-white shrink-0">Threat Analysis</h3>
            <div class="bg-gray-700 p-5 rounded border border-gray-600 mb-6 shadow-sm flex-grow overflow-y-auto">
                <h4 class="font-semibold text-gray-300 mb-2">Immediate Material Threats</h4>
                <div id="evaluationText" class="text-lg font-bold text-white mb-4">Calculating...</div>
                <div id="attackDetails" class="mt-4"></div>
            </div>

        </div>
    </div>

    <!-- PGN Modal -->
    <div id="pgnModal" class="fixed inset-0 bg-black bg-opacity-60 z-50 hidden flex items-center justify-center">
        <div class="bg-gray-800 border border-gray-700 p-6 rounded-lg shadow-2xl w-11/12 max-w-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-white tracking-wide">Export Game Notation (PGN)</h3>
                <button id="closePgnIconBtn" class="text-gray-400 hover:text-white text-2xl font-bold leading-none">&times;</button>
            </div>
            <textarea id="pgnTextarea" class="w-full h-64 bg-gray-900 text-gray-300 p-4 rounded border border-gray-600 font-mono text-sm mb-5 focus:outline-none focus:border-purple-500 resize-none" readonly></textarea>
            <div class="flex justify-end gap-3">
                <button id="closePgnBtn" class="bg-gray-600 hover:bg-gray-500 text-white py-2 px-4 rounded transition shadow">Close</button>
                <button id="copyPgnBtn" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded transition shadow">Copy to Clipboard</button>
                <button id="downloadPgnBtn" class="bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded transition shadow">Download .pgn</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        let board = null;
        let game = new Chess();
        let allTimelines = [{ name: "Main Line", history: [{ fen: game.fen(), move: null }] }];
        let currentTimelineIndex = 0;
        let fullHistory = allTimelines[0].history;
        let currentMoveIndex = 0;
        let isViewingHistory = false;
        let editMode = false;
        let autoHint = true;
        
        let stockfish = null;
        let botColor = null; 
        let engineReady = false;
        
        let engineMode = 'idle'; 
        let currentHints = {};
        let hintTimer = null; 
        let currentEvalScore = 0; 
        let pendingPromotion = null;

        const pieceValues = { 'p': 1, 'n': 3, 'b': 3, 'r': 5, 'q': 9, 'k': 0 };
        const pieceNames = { 'p': 'Pawn', 'n': 'Knight', 'b': 'Bishop', 'r': 'Rook', 'q': 'Queen', 'k': 'King' };

        // Helper to get FEN respecting Edit Mode turn selections safely
        function getCurrentFen() {
            if (!editMode) return game.fen();
            
            let tokens = game.fen().split(' ');
            tokens[1] = $('#turnSelect').val() || 'w';
            
            // Clear castling and en passant rights during Edit Mode to prevent engine rejection
            tokens[2] = '-';
            tokens[3] = '-';
            return tokens.join(' ');
        }

        function updateTurnDropdown() {
            if (!editMode) {
                $('#turnSelect').val(game.turn());
            }
        }

        // Initialize Engine
        const stockfishUrl = 'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js';
        fetch(stockfishUrl)
            .then(response => response.text())
            .then(scriptText => {
                const blob = new Blob([scriptText], {type: 'application/javascript'});
                const workerUrl = URL.createObjectURL(blob);
                stockfish = new Worker(workerUrl);
                
                stockfish.onmessage = function(event) {
                    let line = event.data;
                    
                    if (line === 'uciok') {
                        engineReady = true;
                        document.getElementById('engineStatus').innerText = "Engine Ready";
                        document.getElementById('engineStatus').className = "text-sm px-3 py-1 rounded bg-green-600 text-white font-medium shadow-md";
                        requestHints(); 
                    }

                    // --- Live Eval Bar Processing ---
                    if (line.startsWith('info') && line.includes('score')) {
                        if (!line.includes('multipv') || line.includes('multipv 1')) {
                            let cpMatch = line.match(/score cp (-?\d+)/);
                            let mateMatch = line.match(/score mate (-?\d+)/);
                            
                            // Adjust multiplier to reflect who is actually playing
                            let currentTurn = editMode ? $('#turnSelect').val() : game.turn();
                            let turnMultiplier = currentTurn === 'w' ? 1 : -1;
                            
                            let evalScore = 0;
                            let scoreText = '';
                            if (mateMatch) {
                                let mateIn = parseInt(mateMatch[1]);
                                evalScore = mateIn > 0 ? 10000 * turnMultiplier : -10000 * turnMultiplier;
                                let whiteMate = mateIn * turnMultiplier;
                                scoreText = whiteMate > 0 ? `M${whiteMate}` : `-M${Math.abs(whiteMate)}`;
                            } else if (cpMatch) {
                                evalScore = parseInt(cpMatch[1]) * turnMultiplier;
                                scoreText = (evalScore > 0 ? '+' : '') + (evalScore / 100).toFixed(2);
                                if (evalScore === 0) scoreText = "0.00";
                            }
                            updateEvalBar(evalScore);
                            
                            if (fullHistory[currentMoveIndex]) {
                                fullHistory[currentMoveIndex].scoreText = scoreText;
                                if (currentMoveIndex > 0) {
                                    let moveNum = Math.floor((currentMoveIndex - 1) / 2) + 1;
                                    let scoreEl = document.getElementById(`score-row-${moveNum}`);
                                    if (scoreEl) scoreEl.innerText = scoreText;
                                }
                            }
                        }
                    }

                    if (engineMode === 'hint' && line.startsWith('info') && line.includes('multipv')) {
                        let pvMatch = line.match(/multipv (\d+).* pv ([a-h][1-8][a-h][1-8])/);
                        if (pvMatch) {
                            currentHints[pvMatch[1]] = pvMatch[2];
                        }
                    }

                    if (line.startsWith('bestmove')) {
                        let currentTurn = editMode ? $('#turnSelect').val() : game.turn();
                        
                        if (engineMode === 'hint') {
                            if (autoHint && botColor !== currentTurn) {
                                let movesToDraw = Object.values(currentHints).slice(0, 5);
                                drawArrows(movesToDraw);
                            }
                            engineMode = 'idle';
                        } 
                        else if (engineMode === 'botMove') {
                            let moveStr = line.split(' ')[1];
                            if (moveStr && moveStr !== '(none)') {
                                let fromSq = moveStr.substring(0, 2);
                                let toSq = moveStr.substring(2, 4);
                                let promotion = moveStr.length > 4 ? moveStr.substring(4, 5) : 'q';
                                
                                // If we were viewing history, truncate the future
                                if (isViewingHistory) {
                                    game.load(fullHistory[currentMoveIndex].fen);
                                    let newTimelineName = "Variation " + allTimelines.length;
                                    let branchedHistory = fullHistory.slice(0, currentMoveIndex + 1);
                                    allTimelines.push({ name: newTimelineName, history: branchedHistory });
                                    currentTimelineIndex = allTimelines.length - 1;
                                    fullHistory = allTimelines[currentTimelineIndex].history;
                                    updateTimelineDropdown();
                                }

                                let move = game.move({ from: fromSq, to: toSq, promotion: promotion });

                                // Add new state to history
                                fullHistory.push({ fen: game.fen(), move: move });
                                currentMoveIndex = fullHistory.length - 1;
                                isViewingHistory = false;

                                board.position(game.fen());
                                updateTurnDropdown();
                                updateNotation();
                                clearArrows();
                                analyzeBoard();
                                checkGameOver();
                            }
                            engineMode = 'idle';
                            requestHints(); 
                        }
                    }
                };
                stockfish.postMessage('uci'); 
            })
            .catch(err => {
                document.getElementById('engineStatus').innerText = "Engine Load Failed";
                document.getElementById('engineStatus').className = "text-sm px-3 py-1 rounded bg-red-600 text-white font-medium shadow-md";
            });

        function updateEvalBar(centipawns) {
            currentEvalScore = centipawns;
            let boundedScore = Math.max(-1000, Math.min(1000, centipawns));
            let whitePercent = 50 + 50 * (2 / Math.PI) * Math.atan(boundedScore / 400);
            whitePercent = Math.max(0, Math.min(100, whitePercent));
            
            let whiteBar = document.getElementById('evalBarWhite');
            let blackBar = document.getElementById('evalBarBlack');
            
            whiteBar.style.height = whitePercent + '%';
            blackBar.style.height = (100 - whitePercent) + '%';

            // Swap visual anchor points based on board orientation
            if (board.orientation() === 'white') {
                whiteBar.style.bottom = '0';
                whiteBar.style.top = 'auto';
                blackBar.style.top = '0';
                blackBar.style.bottom = 'auto';
            } else {
                whiteBar.style.top = '0';
                whiteBar.style.bottom = 'auto';
                blackBar.style.bottom = '0';
                blackBar.style.top = 'auto';
            }
        }

        function triggerBotMove() {
            if (!stockfish || !engineReady || game.game_over()) return;
            
            stockfish.postMessage('stop');
            
            engineMode = 'botMove';
            let eloLevel = parseInt(document.getElementById('botElo').value);
            
            let skill = 0;
            let depth = 1; 

            if (eloLevel === 800) { skill = 0; depth = 1; }       
            else if (eloLevel === 1200) { skill = 3; depth = 3; }
            else if (eloLevel === 1500) { skill = 7; depth = 5; }
            else if (eloLevel === 2000) { skill = 15; depth = 10; }
            else if (eloLevel === 2500) { skill = 20; depth = 15; }
            
            stockfish.postMessage('setoption name MultiPV value 1'); 
            stockfish.postMessage('setoption name Skill Level value ' + skill);
            stockfish.postMessage('position fen ' + getCurrentFen());
            stockfish.postMessage('go depth ' + depth); 
        }

        function showHistoryState(index) {
            if (index < 0 || index >= fullHistory.length) return;

            currentMoveIndex = index;
            isViewingHistory = (currentMoveIndex < fullHistory.length - 1);

            const { fen } = fullHistory[index];
            board.position(fen);
            game.load(fen); // Keep the game object in sync

            if (!isViewingHistory) {
                 checkGameOver(); // Re-run game over check for the latest position
            }

            // Update notation to reflect the new state and apply highlights
            updateNotation();

            // Always clear arrows and highlights when jumping in history
            clearArrows();
            analyzeBoard(); 
            
            // Request hints for the historical position
            let tempGame = new Chess(fen);
            if (!tempGame.game_over()) {
                 requestHints(fen);
            }
        }

        function requestHints(customFen = null) {
            clearTimeout(hintTimer);
            hintTimer = setTimeout(() => {
                if (!autoHint || !stockfish || !engineReady) return;
                
                const fenForHint = customFen || getCurrentFen();
                const tempGame = new Chess(fenForHint);
                if (tempGame.game_over()) return;

                // Don't show hints if it's the bot's turn in a live game
                if (!customFen && !editMode && botColor === tempGame.turn()) return;
                
                stockfish.postMessage('stop'); 
                engineMode = 'hint';
                currentHints = {};
                
                stockfish.postMessage('setoption name MultiPV value 5');
                stockfish.postMessage('setoption name Skill Level value 20'); 
                stockfish.postMessage('position fen ' + fenForHint);
                stockfish.postMessage('go depth 12'); 
            }, 100); 
        }

        function updateNotation() {
            let html = '';
            // Build notation from fullHistory to preserve it when loading earlier states
            for (let i = 1; i < fullHistory.length; i += 2) {
                let moveNum = Math.floor(i / 2) + 1;
                let whiteMove = fullHistory[i].move ? fullHistory[i].move.san : '';
                let blackMove = (fullHistory[i + 1] && fullHistory[i + 1].move) ? fullHistory[i + 1].move.san : '';

                const whiteMoveHistIndex = i;
                const blackMoveHistIndex = i + 1;
                
                let whiteBg = (whiteMoveHistIndex === currentMoveIndex) ? 'bg-purple-800' : 'hover:bg-gray-600';
                let blackBg = (blackMoveHistIndex === currentMoveIndex) ? 'bg-purple-800' : (blackMove ? 'hover:bg-gray-600' : '');

                let activeIndexInRow = (currentMoveIndex === whiteMoveHistIndex || currentMoveIndex === blackMoveHistIndex) ? currentMoveIndex : (blackMove ? blackMoveHistIndex : whiteMoveHistIndex);
                let rowScoreText = fullHistory[activeIndexInRow] ? (fullHistory[activeIndexInRow].scoreText || '') : '';

                html += `<div class="flex items-center">
                            <span class="w-8 text-gray-400 shrink-0">${moveNum}.</span>
                            <span class="w-20 font-semibold text-white rounded transition px-2 py-0.5 cursor-pointer ${whiteBg}" data-move-index="${whiteMoveHistIndex}">${whiteMove}</span>
                            <span class="w-20 font-semibold text-gray-300 rounded transition px-2 py-0.5 ${blackMove ? 'cursor-pointer ' + blackBg : ''}" data-move-index="${blackMoveHistIndex}">${blackMove}</span>
                            <span class="w-12 ml-auto text-xs font-mono text-gray-400 text-right shrink-0" id="score-row-${moveNum}">${rowScoreText}</span>
                         </div>`;
            }
            if (fullHistory.length === 1 && fullHistory[0].fen !== 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1') {
                html = `<div class="text-gray-400 italic px-2">Custom Position</div>`;
            }
            let container = document.getElementById('moveHistory');
            container.innerHTML = html;
            
            // Add click listeners
            $('#moveHistory span[data-move-index]').on('click', function() {
                const index = parseInt($(this).data('move-index'));
                if (!isNaN(index)) {
                   showHistoryState(index);
                }
            });

            // Auto-scroll to the current move
            const activeMove = container.querySelector('.bg-purple-800');
            if (activeMove) {
                activeMove.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else if (!isViewingHistory) { // only scroll to bottom if we are at the latest move
                container.scrollTop = container.scrollHeight;
            }
        }

        function updateTimelineDropdown() {
            let select = $('#timelineSelect');
            if (allTimelines.length > 1) {
                select.removeClass('hidden');
                select.empty();
                allTimelines.forEach((tl, idx) => {
                    select.append(`<option value="${idx}" ${idx === currentTimelineIndex ? 'selected' : ''}>${tl.name}</option>`);
                });
            } else {
                select.addClass('hidden');
            }
        }
        
        $('#timelineSelect').on('change', function() {
            currentTimelineIndex = parseInt($(this).val());

        // --- Arrow Drawing Logic ---
        function drawArrows(moves) {
            clearArrows(); 

            let svg = document.getElementById('arrowLayer');
            if (!svg) {
                svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("id", "arrowLayer");
                svg.style.position = "absolute";
                svg.style.top = "0";
                svg.style.left = "0";
                svg.style.width = "100%";
                svg.style.height = "100%";
                svg.style.pointerEvents = "none";
                svg.style.zIndex = "10";

                let defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
                let marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
                marker.setAttribute("id", "arrowhead");
                marker.setAttribute("markerWidth", "5");
                marker.setAttribute("markerHeight", "5");
                marker.setAttribute("refX", "2.5");
                marker.setAttribute("refY", "2.5");
                marker.setAttribute("orient", "auto");
                
                let polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                polygon.setAttribute("points", "0 0, 5 2.5, 0 5");
                polygon.setAttribute("fill", "rgba(168, 85, 247, 0.9)"); 
                
                marker.appendChild(polygon);
                defs.appendChild(marker);
                svg.appendChild(defs);
                document.getElementById('board').appendChild(svg);
            }

            let orientation = board.orientation(); 

            moves.forEach(move => {
                if (!move) return;
                let fromFile = move.charCodeAt(0) - 97; 
                let fromRank = 8 - parseInt(move.charAt(1));
                let toFile = move.charCodeAt(2) - 97;
                let toRank = 8 - parseInt(move.charAt(3));

                if (orientation === 'black') {
                    fromFile = 7 - fromFile;
                    fromRank = 7 - fromRank;
                    toFile = 7 - toFile;
                    toRank = 7 - toRank;
                }

                let x1 = (fromFile + 0.5) * 12.5;
                let y1 = (fromRank + 0.5) * 12.5;
                let x2 = (toFile + 0.5) * 12.5;
                let y2 = (toRank + 0.5) * 12.5;

                let dx = x2 - x1;
                let dy = y2 - y1;
                let len = Math.sqrt(dx*dx + dy*dy);
                if (len > 0) {
                    x2 = x2 - (dx/len) * 3; 
                    y2 = y2 - (dy/len) * 3;
                }

                let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1 + "%");
                line.setAttribute("y1", y1 + "%");
                line.setAttribute("x2", x2 + "%");
                line.setAttribute("y2", y2 + "%");
                line.setAttribute("stroke", "rgba(168, 85, 247, 0.8)"); 
                line.setAttribute("stroke-width", "1.5%");
                line.setAttribute("marker-end", "url(#arrowhead)");
                line.setAttribute("stroke-linecap", "round");
                svg.appendChild(line);
            });
        }

        function clearArrows() {
            let svg = document.getElementById('arrowLayer');

                lines.forEach(l => l.remove());
            }
        }

        // --- Board Configuration ---

        $('#board').on('wheel', function(event) {
            if (pendingPromotion) return;
            event.preventDefault();

            } else {
                // Scroll Down - Go forward in history
                showHistoryState(currentMoveIndex + 1);
            }

            if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA' || event.target.tagName === 'SELECT') return;
            if (pendingPromotion) return;
            if (event.key === 'ArrowUp' || event.key === 'ArrowLeft') {
                event.preventDefault();

        function onDragStart(source, piece, position, orientation) {
            if (editMode) {
                clearArrows(); 
                return true; 
            }
            if (game.game_over()) return false;
            
            if (botColor === game.turn()) return false;

            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
            clearArrows(); 
        }

        function onDrop(source, target, piece, newPos, oldPos, orientation) {
            clearArrows(); 

            if (editMode) {
                syncGameWithBoard(newPos);
                // When in edit mode, we don't want to pollute the main game history
                allTimelines = [{ name: "Main Line", history: [{ fen: getCurrentFen(), move: null }] }];
                currentTimelineIndex = 0;
                fullHistory = allTimelines[0].history;
                currentMoveIndex = 0;
                isViewingHistory = false;
                updateTimelineDropdown();
                updateNotation();
                analyzeBoard();
                requestHints();
                return;
            }

            // Test if the move is valid before officially committing to it or truncating history
            let isPromotion = false;
            let moveObj = { from: source, to: target, promotion: 'q' };
            
            if (piece.charAt(1).toLowerCase() === 'p') {
                if ((piece.charAt(0) === 'w' && target.charAt(1) === '8') ||
                    (piece.charAt(0) === 'b' && target.charAt(1) === '1')) {
                    isPromotion = true;
                }
            }

            let testFen = isViewingHistory ? fullHistory[currentMoveIndex].fen : game.fen();
            let tempGame = new Chess(testFen);
            let testMove = tempGame.move(moveObj);

            if (testMove === null) {
                requestHints(); 
                return 'snapback';
            }
            
            // Valid move! Now safely truncate history if we were reviewing the past
            if (isViewingHistory) {
                game.load(fullHistory[currentMoveIndex].fen);
                let newTimelineName = "Variation " + allTimelines.length;
                let branchedHistory = fullHistory.slice(0, currentMoveIndex + 1);
                allTimelines.push({ name: newTimelineName, history: branchedHistory });
                currentTimelineIndex = allTimelines.length - 1;
                fullHistory = allTimelines[currentTimelineIndex].history;
                updateTimelineDropdown();
            }

            // Pause the move logic to wait for the user to pick a spare piece
            if (isPromotion) {
                pendingPromotion = { source: source, target: target, color: piece.charAt(0) };
                $('#board').addClass('promotion-pending').attr('data-promotion-color', piece.charAt(0));
                return; 
            }

            let move = game.move(moveObj);
            
            // Add new state to history
            fullHistory.push({ fen: game.fen(), move: move });
            currentMoveIndex = fullHistory.length - 1;
            isViewingHistory = false;

            updateTurnDropdown();
            updateNotation();
            analyzeBoard();
            checkGameOver();

            if (!game.game_over() && botColor === game.turn()) {
                setTimeout(triggerBotMove, 250); 
            } else {
                requestHints(); 
            }
        }

        // Handle piece selection during promotion or cancelation if clicked elsewhere
        $(document).on('mousedown', function(e) {
            if (pendingPromotion) {
                let sparePieceImg = $(e.target).closest('[class^="spare-pieces-"] img');
                if (sparePieceImg.length) {
                    let piece = sparePieceImg.attr('data-piece');
                    if (piece && piece.charAt(0) === pendingPromotion.color) {
                        let type = piece.charAt(1).toLowerCase();
                        if (['q', 'r', 'b', 'n'].includes(type)) {
                            let move = game.move({
                                from: pendingPromotion.source,
                                to: pendingPromotion.target,
                                promotion: type
                            });

                            $('#board').removeClass('promotion-pending').removeAttr('data-promotion-color');
                            pendingPromotion = null;

                            if (move) {
                                fullHistory.push({ fen: game.fen(), move: move });
                                currentMoveIndex = fullHistory.length - 1;
                                isViewingHistory = false;

                                board.position(game.fen());
                                updateTurnDropdown();
                                updateNotation();
                                analyzeBoard();
                                checkGameOver();

                                if (!game.game_over() && botColor === game.turn()) {

                                }
                            } else {

                            }

                    }

            }

        // --- Threat Analysis & Sight Logic ---
        function analyzeBoard() {
            highlightLastMove();

            if (game.game_over()) return; 
            
            if (!validateBoard()) {
                $('#board .square-55d63').removeClass('highlight-attacked highlight-protected highlight-both highlight-empty-attacked highlight-last-move');
                let evalEl = document.getElementById('evaluationText');
                let detailsEl = document.getElementById('attackDetails');
                evalEl.innerHTML = "<span class='text-red-400 text-base'>Analysis paused. Both Kings must be on the board.</span>";
                detailsEl.innerHTML = "";
                document.getElementById('evalBarWhite').style.height = '50%';
                document.getElementById('evalBarBlack').style.height = '50%';
                return;
            }

            $('#board .square-55d63').removeClass('highlight-attacked highlight-protected highlight-both highlight-empty-attacked');

            let evalEl = document.getElementById('evaluationText');
            let detailsEl = document.getElementById('attackDetails');

            let whiteMoves = getTrueSights('w');
            let blackMoves = getTrueSights('b');
            
            let whiteAttackScore = 0;
            let blackAttackScore = 0;
            
            let whiteHanging = []; 
            let whiteProtectedAttacked = []; 
            let blackHanging = []; 
            let blackProtectedAttacked = []; 

            const squares = ['a8','b8','c8','d8','e8','f8','g8','h8',
                             'a7','b7','c7','d7','e7','f7','g7','h7',
                             'a6','b6','c6','d6','e6','f6','g6','h6',
                             'a5','b5','c5','d5','e5','f5','g5','h5',
                             'a4','b4','c4','d4','e4','f4','g4','h4',
                             'a3','b3','c3','d3','e3','f3','g3','h3',
                             'a2','b2','c2','d2','e2','f2','g2','h2',
                             'a1','b1','c1','d1','e1','f1','g1','h1'];

            let visualOrientation = board.orientation() === 'white' ? 'w' : 'b';
            let enemyMoves = visualOrientation === 'w' ? blackMoves : whiteMoves;

            squares.forEach(sq => {
                let piece = game.get(sq);
                let sqEl = $('#board .square-' + sq);
                
                if (piece) {
                    let isProtected = false;
                    let isAttacked = false;

                    if (piece.color === 'w') {
                        isAttacked = blackMoves.includes(sq);
                        isProtected = isProtectedBy(sq, 'w');
                        if (isAttacked && piece.type !== 'k') {
                            let text = `${pieceNames[piece.type]} on ${sq} (${pieceValues[piece.type]} pts)`;
                            if (!isProtected) {
                                blackAttackScore += pieceValues[piece.type];
                                blackHanging.push(text);
                            } else {
                                blackProtectedAttacked.push(text);
                            }
                        }
                    } else {
                        isAttacked = whiteMoves.includes(sq);
                        isProtected = isProtectedBy(sq, 'b');
                        if (isAttacked && piece.type !== 'k') {
                            let text = `${pieceNames[piece.type]} on ${sq} (${pieceValues[piece.type]} pts)`;
                            if (!isProtected) {
                                whiteAttackScore += pieceValues[piece.type];
                                whiteHanging.push(text);
                            } else {
                                whiteProtectedAttacked.push(text);
                            }
                        }
                    }

                    if (isAttacked && isProtected) {
                        sqEl.addClass('highlight-both');
                    } else if (isAttacked) {
                        sqEl.addClass('highlight-attacked');
                    } else if (isProtected) {
                        sqEl.addClass('highlight-protected');
                    }
                } else {
                    if (enemyMoves.includes(sq)) {
                        sqEl.addClass('highlight-empty-attacked');
                    }
                }
            });

            let diff = whiteAttackScore - blackAttackScore;
            if (diff > 0) evalEl.innerHTML = `White holds a material threat advantage (+${diff} pts)`;
            else if (diff < 0) evalEl.innerHTML = `Black holds a material threat advantage (+${Math.abs(diff)} pts)`;
            else evalEl.innerHTML = "Material threats are roughly equal";

            let detailHtml = `<div class="grid grid-cols-1 gap-6 border-t border-gray-600 pt-5 mt-2">`;
            
            detailHtml += `<div><strong class="text-white border-b border-gray-600 pb-1 block mb-3 text-lg">White is attacking:</strong>`;
            detailHtml += `<div class="text-xs text-red-400 mt-2 uppercase font-bold tracking-wider">Unprotected (Hanging)</div>`;
            detailHtml += `<ul class="list-disc pl-5 text-gray-300 text-sm mt-1 space-y-1">`;
            if (whiteHanging.length === 0) detailHtml += `<li class="text-gray-500 list-none -ml-5">None</li>`;
            else whiteHanging.forEach(p => detailHtml += `<li>${p}</li>`);
            detailHtml += `</ul>`;
            detailHtml += `<div class="text-xs text-orange-400 mt-4 uppercase font-bold tracking-wider">Protected</div>`;
            detailHtml += `<ul class="list-disc pl-5 text-gray-300 text-sm mt-1 space-y-1">`;
            if (whiteProtectedAttacked.length === 0) detailHtml += `<li class="text-gray-500 list-none -ml-5">None</li>`;
            else whiteProtectedAttacked.forEach(p => detailHtml += `<li>${p}</li>`);
            detailHtml += `</ul></div>`;

            detailHtml += `<div><strong class="text-white border-b border-gray-600 pb-1 block mb-3 text-lg">Black is attacking:</strong>`;
            detailHtml += `<div class="text-xs text-red-400 mt-2 uppercase font-bold tracking-wider">Unprotected (Hanging)</div>`;
            detailHtml += `<ul class="list-disc pl-5 text-gray-300 text-sm mt-1 space-y-1">`;
            if (blackHanging.length === 0) detailHtml += `<li class="text-gray-500 list-none -ml-5">None</li>`;
            else blackHanging.forEach(p => detailHtml += `<li>${p}</li>`);
            detailHtml += `</ul>`;
            detailHtml += `<div class="text-xs text-orange-400 mt-4 uppercase font-bold tracking-wider">Protected</div>`;
            detailHtml += `<ul class="list-disc pl-5 text-gray-300 text-sm mt-1 space-y-1">`;
            if (blackProtectedAttacked.length === 0) detailHtml += `<li class="text-gray-500 list-none -ml-5">None</li>`;
            else blackProtectedAttacked.forEach(p => detailHtml += `<li>${p}</li>`);
            detailHtml += `</ul></div></div>`;

            detailsEl.innerHTML = detailHtml;
        }

        function getTrueSights(color) {
            let fen = getCurrentFen();
            let tokens = fen.split(' ');
            tokens[1] = color;
            tokens[3] = '-'; 
            
            let temp = new Chess();
            let sights = [];

            if (temp.load(tokens.join(' '))) {
                let moves = temp.moves({verbose: true});
                
                moves.forEach(m => {
                    if (m.piece !== 'p' && m.piece !== 'k') {
                        sights.push(m.to);
                    }
                });

                const files = 'abcdefgh';
                for (let r = 1; r <= 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        let sq = files[c] + r;
                        let piece = temp.get(sq);
                        
                        if (piece && piece.color === color) {
                            if (piece.type === 'p') {
                                let direction = (color === 'w') ? 1 : -1;
                                let targetRank = r + direction;
                                if (targetRank >= 1 && targetRank <= 8) {
                                    if (c > 0) sights.push(files[c - 1] + targetRank);
                                    if (c < 7) sights.push(files[c + 1] + targetRank);
                                }
                            } else if (piece.type === 'k') {
                                for (let dr = -1; dr <= 1; dr++) {
                                    for (let dc = -1; dc <= 1; dc++) {
                                        if (dr === 0 && dc === 0) continue;
                                        let tr = r + dr;
                                        let tc = c + dc;
                                        if (tr >= 1 && tr <= 8 && tc >= 0 && tc <= 7) {
                                            sights.push(files[tc] + tr);
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
            return [...new Set(sights)]; 
        }

        function isProtectedBy(square, color) {
            let piece = game.get(square);
            if (piece && piece.type === 'k') return false; 

            let files = 'abcdefgh';
            let sqFile = files.indexOf(square.charAt(0));
            let sqRank = parseInt(square.charAt(1));

            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    let tr = sqRank + dr;
                    let tc = sqFile + dc;
                    if (tr >= 1 && tr <= 8 && tc >= 0 && tc <= 7) {
                        let checkSq = files[tc] + tr;
                        let p = game.get(checkSq);
                        if (p && p.type === 'k' && p.color === color) {
                            return true; 
                        }
                    }
                }
            }

            let enemyColor = color === 'w' ? 'b' : 'w';
            let tempGame = new Chess(getCurrentFen());
            
            tempGame.put({ type: 'p', color: enemyColor }, square);
            
            let tokens = tempGame.fen().split(' ');
            tokens[1] = color; 
            tokens[3] = '-'; 

            let temp2 = new Chess();
            if (temp2.load(tokens.join(' '))) {
                return temp2.moves({ verbose: true }).some(m => m.to === square);
            }
            return false;
        }

        // --- PGN Export Logic ---
        function generatePGN() {
            let tempGame = new Chess();
            
            // Handle custom starting positions
            if (fullHistory[0].fen !== 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1') {
                tempGame.load(fullHistory[0].fen);
                tempGame.header('SetUp', '1');
                tempGame.header('FEN', fullHistory[0].fen);
            }
            
            tempGame.header('Event', allTimelines[currentTimelineIndex].name);
            tempGame.header('Site', 'Chess Vision Practice');
            tempGame.header('Date', new Date().toISOString().split('T')[0].replace(/-/g, '.'));
            tempGame.header('White', 'Player');
            tempGame.header('Black', botColor !== null ? `Bot (${$('#botElo').val()} Elo)` : 'Player');
            
            // Replay the full current timeline to build the PGN
            for (let i = 1; i < fullHistory.length; i++) {
                if (fullHistory[i].move) {
                    tempGame.move(fullHistory[i].move);
                }
            }
            
            return tempGame.pgn();
        }

        $('#exportPgnBtn').on('click', () => {
            $('#pgnTextarea').val(generatePGN());
            $('#pgnModal').removeClass('hidden');
        });

        $('#closePgnBtn, #closePgnIconBtn').on('click', () => {
            $('#pgnModal').addClass('hidden');
        });

        $('#copyPgnBtn').on('click', function() {
            let $btn = $(this);
            navigator.clipboard.writeText($('#pgnTextarea').val()).then(() => {
                let originalText = $btn.text();
                $btn.text('Copied!');
                $btn.removeClass('bg-blue-600 hover:bg-blue-700').addClass('bg-green-600 hover:bg-green-700');
                setTimeout(() => {
                    $btn.text(originalText);
                    $btn.removeClass('bg-green-600 hover:bg-green-700').addClass('bg-blue-600 hover:bg-blue-700');
                }, 2000);
            });
        });

        $('#downloadPgnBtn').on('click', () => {
            let pgn = $('#pgnTextarea').val();
            let blob = new Blob([pgn], { type: 'text/plain' });
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = `chess_practice_${new Date().toISOString().split('T')[0]}.pgn`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        analyzeBoard();
    </script>
</body>
</html>
